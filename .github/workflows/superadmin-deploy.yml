name: Deploy SuperAdmin to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy-superadmin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/superadmin-web/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: apps/superadmin-web

      - name: Generate Prisma
        run: npx prisma generate
        working-directory: apps/superadmin-web

      - name: Deploy to Vercel (Preview)
        if: github.event_name == 'pull_request'
        uses: nickshanks/vercel@v1
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_SUPERADMIN }}
          working-directory: apps/superadmin-web

      - name: Deploy to Vercel (Production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: nickshanks/vercel@v1
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_SUPERADMIN }}
          working-directory: apps/superadmin-web
          vercel-args: '--prod'